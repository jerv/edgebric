# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — Development
#
# Usage:
#   docker compose up --build
#
# What it does:
#   - Builds the Edgebric image from source
#   - Runs with dev-friendly defaults (relaxed secrets, localhost URLs)
#   - Data persists in a named volume (survives container restarts)
#
# Environment:
#   - Copy .env.example to .env and fill in your values
#   - Or set variables inline: OIDC_CLIENT_ID=xxx docker compose up
# ─────────────────────────────────────────────────────────────────────────────
services:
  edgebric:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - edgebric-data:/app/data
    env_file:
      - ./packages/api/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATA_DIR=/app/data
      - FRONTEND_URL=http://localhost:3001
      # llama-server runs on the HOST, not in the container.
      - INFERENCE_CHAT_URL=${INFERENCE_CHAT_URL:-http://host.docker.internal:8080/v1}
      - INFERENCE_EMBEDDING_URL=${INFERENCE_EMBEDDING_URL:-http://host.docker.internal:8081}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  edgebric-data:
