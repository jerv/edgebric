appId: com.edgebric.desktop
productName: Edgebric
copyright: Copyright © 2026 Edgebric
directories:
  output: dist
  buildResources: resources
publish:
  provider: github
  owner: jerv
  repo: edgebric
mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  notarize:
    teamId: ${env.APPLE_TEAM_ID}
dmg:
  title: Edgebric
  artifactName: Edgebric-${version}-${arch}.dmg
  icon: resources/icon.icns
  format: UDBZ
  window:
    width: 512
    height: 320
  contents:
    - x: 170
      y: 50
      type: file
    - x: 342
      y: 50
      type: link
      path: /Applications
  background: resources/dmg-background.png
