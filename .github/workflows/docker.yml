# ─────────────────────────────────────────────────────────────────────────────
# Docker Build — Builds and pushes container images
#
# What it does:
#   - Builds the Docker image using the multi-stage Dockerfile
#   - Pushes to GitHub Container Registry (ghcr.io)
#   - Tags images based on the branch/event:
#       push to dev   → ghcr.io/jerv/edgebric:dev
#       push to main  → ghcr.io/jerv/edgebric:latest
#       git tag v*    → ghcr.io/jerv/edgebric:1.0.0
#
# Why:
#   - Dev image lets you test Docker builds without affecting production
#   - Production image only gets built from tested, merged code on main
#   - Tagged images pin a specific version for rollbacks
# ─────────────────────────────────────────────────────────────────────────────
name: Docker

on:
  push:
    branches: [main, dev]
    tags: ["v*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Branch pushes: "dev" or "latest"
            type=ref,event=branch
            # Replace "main" tag with "latest"
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Version tags: v1.0.0 → 1.0.0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Short SHA for traceability
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
