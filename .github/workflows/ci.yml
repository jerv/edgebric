# ─────────────────────────────────────────────────────────────────────────────
# CI — Runs on every push and pull request
#
# What it does:
#   1. Lint (ESLint) — catches code style and potential bugs
#   2. Typecheck (tsc) — catches type errors across all packages
#   3. Test (vitest) — runs all unit tests
#   4. Build — verifies the full build succeeds
#
# When it runs:
#   - Every push to dev or main
#   - Every pull request targeting dev or main
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
