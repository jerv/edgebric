# ─────────────────────────────────────────────────────────────────────────────
# Release — Builds, signs, notarizes, and publishes the macOS desktop app
#
# Triggers on version tags (e.g. v1.0.0). Use scripts/release.sh to cut a
# release, or manually:
#   1. Bump version in package.json + packages/desktop/package.json
#   2. Commit: git commit -am "release: v1.0.0"
#   3. Tag:    git tag v1.0.0
#   4. Push:   git push origin main --tags
#
# Produces:
#   - Signed + notarized DMG (arm64 + x64)
#   - Signed zip (arm64 + x64) for electron-updater
#   - latest-mac.yml for electron-updater auto-update detection
#   - GitHub Release with auto-generated changelog
#
# Required secrets:
#   APPLE_CERTIFICATE_BASE64      — Base64-encoded .p12 Developer ID certificate
#   APPLE_CERTIFICATE_PASSWORD    — Password for the .p12 certificate
#   APPLE_ID                      — Apple ID email for notarization
#   APPLE_APP_SPECIFIC_PASSWORD   — App-specific password for notarization
#   APPLE_TEAM_ID                 — Apple Developer Team ID
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Desktop App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Bundle API server for desktop app
        run: node scripts/bundle-server.mjs

      - name: Install server native dependencies
        run: node scripts/install-server-deps.mjs

      - name: Smoke test bundled server
        run: node scripts/smoke-test-bundle.mjs

      - name: Rebuild native modules for Electron
        run: node scripts/rebuild-for-electron.mjs

      # Import the Apple Developer ID certificate into a temporary keychain
      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # Build the Electron app (DMG + zip for both architectures)
      - name: Build Electron app
        working-directory: packages/desktop
        env:
          # Code signing
          CSC_KEYCHAIN: ${{ runner.temp }}/app-signing.keychain-db
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Publish to GitHub Releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --mac --arm64 --x64 --publish always

      # Clean up the temporary keychain
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

