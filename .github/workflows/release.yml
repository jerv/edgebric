# ─────────────────────────────────────────────────────────────────────────────
# Release — Creates a GitHub Release when you push a version tag
#
# How to use:
#   1. Update version in package.json (e.g. 0.1.0 → 0.2.0)
#   2. Commit: git commit -am "release: v0.2.0"
#   3. Tag:    git tag v0.2.0
#   4. Push:   git push origin main --tags
#
# What happens:
#   - CI runs (lint, typecheck, test, build)
#   - Docker image gets built and pushed with version tag
#   - This workflow creates a GitHub Release with:
#       - Auto-generated changelog from commits since last tag
#       - Build artifacts (.tar.gz) attached for Homebrew formula
#
# Why:
#   - GitHub Releases are free hosting for Homebrew formula downloads
#   - The changelog gives users a summary of what changed
#   - Tagged releases make it easy to roll back to any version
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog generation

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package release artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Create a distributable tarball with everything needed to run
          tar -czf edgebric-${VERSION}.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='spikes' \
            --exclude='*.db' \
            --exclude='data/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='!.env.example' \
            packages/ shared/ \
            package.json pnpm-lock.yaml pnpm-workspace.yaml \
            tsconfig.json \
            Dockerfile docker-compose.yml docker-compose.prod.yml \
            .dockerignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: edgebric-*.tar.gz
