name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (
        (github.event_name == 'pull_request_target' && github.event.action != 'closed'
          && github.event.pull_request.user.login != 'jerv')
        || (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
      )
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "main"
          allowlist: jerv,dependabot[bot],github-actions[bot]
          remote-organization-name: false
          remote-repository-name: false
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, you need to agree to the [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to do this once across all PRs.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          lock-pullrequest-aftermerge: false
